name: vora
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter


  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.1.1

  # Local notifications
  flutter_local_notifications: ^18.0.1

  # Date formatting
  intl: ^0.19.0

  # File picking + helpers (for note attachments)
  file_picker: ^8.1.2
  path: ^1.9.0
  mime: ^2.0.0

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  flutter_timezone: ^4.1.0
  timezone: ^0.9.4
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/